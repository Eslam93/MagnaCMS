[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Migration file naming: <slot>_<rev>_<slug>.py — sortable AND readable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Always interpret paths relative to alembic.ini, not the cwd.
prepend_sys_path = .
version_path_separator = os

# `sqlalchemy.url` is intentionally left blank — env.py overrides it with the
# value from `app.core.config.Settings.database_url`, so the connection string
# lives in exactly one place (env vars / Secrets Manager).
sqlalchemy.url =

# Auto-format generated migrations with Ruff to match project style.
[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# ──────────────────────────────────────────────────────────────────────
# Logging — matches our structlog level. Verbose Alembic output is useful
# for `alembic upgrade head` runs but stays out of the request path.
# ──────────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
