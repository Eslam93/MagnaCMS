name: deploy

# Manual-dispatch only until the first successful deploy is verified.
# After the live runbook (infra/DEPLOY.md) is run end-to-end and the
# Phase-2 IP-identity preflight passes, flip this to `on: push: main`
# for automatic deploys on backend changes.
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        default: dev
        options:
          - dev
      run_migrations:
        description: 'Run alembic upgrade head as a Fargate task post-deploy'
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.event.inputs.env }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write   # for aws-actions/configure-aws-credentials OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        # OIDC-based role assumption — no long-lived AWS keys in
        # GitHub Secrets. Set AWS_DEPLOY_ROLE_ARN to the role you
        # bootstrapped (DEPLOY.md walks through the setup).
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve service ARNs from CDK outputs
        id: resolve
        run: |
          ENV=${{ github.event.inputs.env }}
          ECR_URI=$(aws cloudformation describe-stacks \
            --stack-name magnacms-$ENV-compute \
            --query "Stacks[0].Outputs[?ExportName=='magnacms-$ENV-compute-ecr-uri'].OutputValue" \
            --output text)
          APPRUNNER_ARN=$(aws cloudformation describe-stacks \
            --stack-name magnacms-$ENV-compute \
            --query "Stacks[0].Outputs[?ExportName=='magnacms-$ENV-compute-apprunner-service-arn'].OutputValue" \
            --output text)
          APPRUNNER_URL=$(aws cloudformation describe-stacks \
            --stack-name magnacms-$ENV-compute \
            --query "Stacks[0].Outputs[?ExportName=='magnacms-$ENV-compute-apprunner-service-url'].OutputValue" \
            --output text)
          MIGRATION_CLUSTER=$(aws cloudformation describe-stacks \
            --stack-name magnacms-$ENV-compute \
            --query "Stacks[0].Outputs[?ExportName=='magnacms-$ENV-compute-migration-cluster-arn'].OutputValue" \
            --output text)
          MIGRATION_TASK_DEF=$(aws cloudformation describe-stacks \
            --stack-name magnacms-$ENV-compute \
            --query "Stacks[0].Outputs[?ExportName=='magnacms-$ENV-compute-migration-task-arn'].OutputValue" \
            --output text)
          {
            echo "ecr_uri=$ECR_URI"
            echo "apprunner_arn=$APPRUNNER_ARN"
            echo "apprunner_url=$APPRUNNER_URL"
            echo "migration_cluster=$MIGRATION_CLUSTER"
            echo "migration_task_def=$MIGRATION_TASK_DEF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push backend image
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "${{ steps.resolve.outputs.ecr_uri }}"
          docker build -t "${{ steps.resolve.outputs.ecr_uri }}:${GITHUB_SHA}" \
                       -t "${{ steps.resolve.outputs.ecr_uri }}:latest" \
                       backend/
          docker push "${{ steps.resolve.outputs.ecr_uri }}:${GITHUB_SHA}"
          docker push "${{ steps.resolve.outputs.ecr_uri }}:latest"

      - name: Run Alembic migrations (Fargate one-off task)
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: |
          # ECS run-task against the magnacms-${env}-migrate task def.
          # Uses the public subnets from NetworkStack (read via tag).
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=tag:environment,Values=${{ github.event.inputs.env }}" \
                      "Name=map-public-ip-on-launch,Values=true" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.resolve.outputs.migration_cluster }}" \
            --task-definition "${{ steps.resolve.outputs.migration_task_def }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Waiting for migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.resolve.outputs.migration_cluster }}" \
            --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ steps.resolve.outputs.migration_cluster }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration task exited with code $EXIT_CODE"
            exit 1
          fi

      - name: Trigger App Runner deployment
        run: |
          DEPLOYMENT_ID=$(aws apprunner start-deployment \
            --service-arn "${{ steps.resolve.outputs.apprunner_arn }}" \
            --query 'OperationId' --output text)
          echo "Deployment started: $DEPLOYMENT_ID"

      - name: Wait for App Runner to be RUNNING
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ steps.resolve.outputs.apprunner_arn }}" \
              --query 'Service.Status' --output text)
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "::notice::App Runner is RUNNING"
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETED" ]; then
              echo "::error::App Runner reached terminal failure state: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "::error::App Runner did not reach RUNNING within timeout"
          exit 1

      - name: Smoke-test /health
        run: |
          URL="${{ steps.resolve.outputs.apprunner_url }}"
          for i in $(seq 1 10); do
            RESPONSE=$(curl -fsSL "https://$URL/api/v1/health" || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "::notice::Health check passed: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i: not ready yet, retrying in 5s"
            sleep 5
          done
          echo "::error::Health check failed after 10 attempts"
          exit 1
