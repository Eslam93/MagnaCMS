name: infra-ci

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./infra
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Unit + snapshot tests
        run: npm test

      - name: CDK synth (dev)
        # `cdk synth` requires at least one stack. P2.1 ships the
        # bootstrap with no stacks yet; P2.2 lands NetworkStack, after
        # which synth runs on every PR. The guard auto-removes itself
        # once any *-stack.ts file exists in lib/.
        #
        # Context: `cors_origins` and `images_cdn_base_url` are
        # required for non-local deploys (see bin/magnacms.ts). CI
        # synths use placeholder values so the synth path exercises
        # the same code as a real deploy. A real deploy MUST pass
        # the production values (see infra/DEPLOY.md §2).
        run: |
          if ls lib/*-stack.ts >/dev/null 2>&1; then
            npx cdk synth --all \
              -c env=dev \
              -c cors_origins=https://ci.example.com \
              -c images_cdn_base_url=https://ci.example.com/local-images
          else
            echo "No stacks defined yet — skipping cdk synth. Next PR (P2.2) wires NetworkStack."
          fi
