name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # pnpm cache wires up in P4.1 once frontend/pnpm-lock.yaml exists.
          # Enabling `cache: 'pnpm'` before then fails the run with "specified
          # paths were not resolved, unable to cache dependencies" before any
          # step runs.

      - name: Skeleton check (P0.4)
        # Real steps (lint/typecheck/test/build) wire up in P4.1 once package.json exists.
        run: |
          echo "frontend-ci skeleton — real pipeline lands in P4.1"
          if [ -f package.json ]; then
            pnpm install --frozen-lockfile
            pnpm lint
            pnpm prettier --check .
            pnpm tsc --noEmit
            pnpm test --run
            pnpm build
          else
            echo "no package.json yet — skipping lint/typecheck/test/build"
          fi
