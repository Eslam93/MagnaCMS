name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    services:
      # Postgres for the integration suite. Without this, ~19 tests
      # (auth refresh/rotation, the high-value SQL paths) skip in CI
      # because `integration_engine` fails to connect.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Lint, typecheck, migrate, test
        # Real steps wired up in P1.1; postgres service + migrations
        # added in P1.10 so integration tests actually run in CI.
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --frozen
            uv run ruff check .
            uv run ruff format --check .
            uv run mypy app
            uv run alembic upgrade head
            uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80
          else
            echo "no pyproject.toml yet — skipping lint/typecheck/test"
          fi

      - name: Set up Node.js (for openapi-typescript drift check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI spec is consumable by openapi-typescript
        # Catches the class of bugs where a Pydantic schema produces a
        # spec openapi-typescript can't process (cyclic refs, unnamed
        # unions, anyOf with no titles, etc.) — the frontend's typed
        # client would silently lose type safety on those routes.
        #
        # We don't strict-diff against the committed `types/api.d.ts`
        # yet because that file is still hand-stubbed; that swap is
        # tracked in #50. This gate is the cheap pre-step: ensure the
        # spec is generator-safe so the strict-diff job, when added,
        # has a real baseline to compare against.
        env:
          # `app.main:app` boots the FastAPI app; we need ENVIRONMENT=local
          # so the Settings validator doesn't require real secrets.
          ENVIRONMENT: local
          AI_PROVIDER_MODE: mock
          ALLOW_MOCK_PROVIDER: "true"
        run: |
          if [ -f pyproject.toml ]; then
            uv run python -c "import json; from app.main import app; \
              json.dump(app.openapi(), open('/tmp/openapi.json', 'w'))"
            npx --yes openapi-typescript@7.4 /tmp/openapi.json -o /tmp/api.d.ts
            wc -l /tmp/api.d.ts
          else
            echo "no pyproject.toml yet — skipping openapi-typescript validation"
          fi
